name: Tägliches Daten-Update

on:
  schedule:
    # 04:00 UTC = 06:00 Berlin (Sommerzeit) bzw. 05:00 (Winterzeit)
    - cron: "0 4 * * *"
  workflow_dispatch: {}   # manueller Start über den Actions-Tab
  push:
    branches: [main]      # läuft auch nach jedem Push (z.B. bei Code-Änderungen)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten
        run: pip install --quiet openpyxl

      - name: Tennis-Historie laden (tennis-data.co.uk)
        run: |
          {
            mkdir -p /tmp/tennisdata
            Y=$(date +%Y)
            for y in $((Y-4)) $((Y-3)) $((Y-2)) $((Y-1)) $Y; do
              code=$(curl -sL -w "%{http_code}" "http://www.tennis-data.co.uk/${y}/${y}.zip" \
                -o "/tmp/tennisdata/atp_${y}.zip") || code=err
              echo "ATP ${y}: HTTP ${code}, $(wc -c < /tmp/tennisdata/atp_${y}.zip 2>/dev/null || echo 0) Bytes"
              [ "${code}" != "200" ] && rm -f "/tmp/tennisdata/atp_${y}.zip"
              code=$(curl -sL -w "%{http_code}" "http://www.tennis-data.co.uk/${y}w/${y}.zip" \
                -o "/tmp/tennisdata/wta_${y}.zip") || code=err
              echo "WTA ${y}: HTTP ${code}, $(wc -c < /tmp/tennisdata/wta_${y}.zip 2>/dev/null || echo 0) Bytes"
              [ "${code}" != "200" ] && rm -f "/tmp/tennisdata/wta_${y}.zip"
            done
            ls -la /tmp/tennisdata/ || true
          } 2>&1 | tee /tmp/clone.log

      - name: Daten holen & Vorhersagen berechnen
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}   # optional
        run: |
          set -o pipefail
          { cat /tmp/clone.log 2>/dev/null; python scripts/fetch_data.py; } 2>&1 | tee data/last_run.log

      - name: Dashboard bauen
        run: python scripts/build_site.py

      - name: Änderungen committen
        run: |
          git config user.name "sport-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/data.json data/last_run.log docs/index.html
          if git diff --cached --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "Tägliches Update $(date -u +%F)"
            git push
          fi
