name: Tägliches Daten-Update

on:
  schedule:
    # 04:00 UTC = 06:00 Berlin (Sommerzeit) bzw. 05:00 (Winterzeit)
    - cron: "0 4 * * *"
  workflow_dispatch: {}   # manueller Start über den Actions-Tab
  push:
    branches: [main]      # läuft auch nach jedem Push (z.B. bei Code-Änderungen)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Tennis-Historie laden (Sackmann, CC BY-NC-SA)
        env:
          GH_API_TOKEN: ${{ github.token }}
        run: |
          {
            echo "== Diagnose =="
            curl -s -o /dev/null -w "raw.githubusercontent direkt: HTTP %{http_code}\n" \
              "https://raw.githubusercontent.com/JeffSackmann/tennis_atp/master/atp_matches_2024.csv" || true
            for tour in atp wta; do
              mkdir -p "/tmp/tennis_${tour}"
              for y in 2022 2023 2024 2025 2026; do
                f="${tour}_matches_${y}.csv"
                code=$(curl -s -w "%{http_code}" \
                  -H "Authorization: Bearer ${GH_API_TOKEN}" \
                  -H "Accept: application/vnd.github.raw+json" \
                  "https://api.github.com/repos/JeffSackmann/tennis_${tour}/contents/${f}" \
                  -o "/tmp/tennis_${tour}/${f}") || code=err
                if [ "${code}" != "200" ]; then
                  code=$(curl -sL -w "%{http_code}" \
                    "https://cdn.jsdelivr.net/gh/JeffSackmann/tennis_${tour}@master/${f}" \
                    -o "/tmp/tennis_${tour}/${f}") || code=err
                  src="jsdelivr"
                else
                  src="gh-api"
                fi
                size=$(wc -c < "/tmp/tennis_${tour}/${f}" 2>/dev/null || echo 0)
                echo "${f}: HTTP ${code} (${src}), ${size} Bytes"
                if [ "${code}" != "200" ]; then rm -f "/tmp/tennis_${tour}/${f}"; fi
              done
            done
          } 2>&1 | tee /tmp/clone.log

      - name: Daten holen & Vorhersagen berechnen
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}   # optional
        run: |
          set -o pipefail
          { cat /tmp/clone.log 2>/dev/null; python scripts/fetch_data.py; } 2>&1 | tee data/last_run.log

      - name: Dashboard bauen
        run: python scripts/build_site.py

      - name: Änderungen committen
        run: |
          git config user.name "sport-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/data.json data/last_run.log docs/index.html
          if git diff --cached --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "Tägliches Update $(date -u +%F)"
            git push
          fi
