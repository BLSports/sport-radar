name: Tägliches Daten-Update

on:
  schedule:
    # 04:00 UTC = 06:00 Berlin (Sommerzeit) bzw. 05:00 (Winterzeit)
    - cron: "0 4 * * *"
  workflow_dispatch: {}   # manueller Start über den Actions-Tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Daten holen & Vorhersagen berechnen
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}   # optional
        run: python scripts/fetch_data.py

      - name: Dashboard bauen
        run: python scripts/build_site.py

      - name: Änderungen committen
        run: |
          git config user.name "sport-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/data.json docs/index.html
          if git diff --cached --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "Tägliches Update $(date -u +%F)"
            git push
          fi
