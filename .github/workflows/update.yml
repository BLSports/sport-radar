name: Tägliches Daten-Update

on:
  schedule:
    # 04:00 UTC = 06:00 Berlin (Sommerzeit) bzw. 05:00 (Winterzeit)
    - cron: "0 4 * * *"
  workflow_dispatch: {}   # manueller Start über den Actions-Tab
  push:
    branches: [main]      # läuft auch nach jedem Push (z.B. bei Code-Änderungen)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Tennis-Historie laden (Sackmann, CC BY-NC-SA)
        run: |
          {
            for repo in tennis_atp tennis_wta; do
              echo "== Clone ${repo} =="
              git clone --depth 1 --filter=blob:none --sparse \
                "https://github.com/JeffSackmann/${repo}.git" "/tmp/${repo}" || echo "CLONE FEHLGESCHLAGEN: ${repo}"
              if [ -d "/tmp/${repo}" ]; then
                (cd "/tmp/${repo}" && git sparse-checkout set --no-cone "*matches_20*.csv" \
                 && echo "Dateien:" && ls *matches_20*.csv | tail -5) || echo "SPARSE-CHECKOUT FEHLGESCHLAGEN: ${repo}"
              fi
            done
          } 2>&1 | tee /tmp/clone.log

      - name: Daten holen & Vorhersagen berechnen
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}   # optional
        run: |
          set -o pipefail
          { cat /tmp/clone.log 2>/dev/null; python scripts/fetch_data.py; } 2>&1 | tee data/last_run.log

      - name: Dashboard bauen
        run: python scripts/build_site.py

      - name: Änderungen committen
        run: |
          git config user.name "sport-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/data.json data/last_run.log docs/index.html
          if git diff --cached --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "Tägliches Update $(date -u +%F)"
            git push
          fi
