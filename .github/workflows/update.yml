name: Tägliches Daten-Update

on:
  schedule:
    # 04:00 UTC = 06:00 Berlin (Sommerzeit) bzw. 05:00 (Winterzeit)
    - cron: "0 4 * * *"
  workflow_dispatch: {}   # manueller Start über den Actions-Tab
  push:
    branches: [main]      # läuft auch nach jedem Push (z.B. bei Code-Änderungen)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten
        run: pip install --quiet openpyxl

      - name: Tennis-Historie laden (tennis-data.co.uk)
        run: |
          {
            mkdir -p /tmp/tennisdata
            Y=$(date +%Y)
            fetch_xlsx() {  # $1=Ziel, $2=Pfadteil (z.B. 2024 oder 2024w), $3=Jahr
              for base in "https://www.tennis-data.co.uk" "http://www.tennis-data.co.uk"; do
                code=$(curl -sL -w "%{http_code}" "${base}/$2/$3.xlsx" -o "$1") || code=err
                if [ "${code}" = "200" ] && file "$1" | grep -qiE 'excel|zip'; then
                  echo "$1: OK über ${base} ($(wc -c < "$1") Bytes)"
                  return 0
                fi
              done
              echo "$1: FEHLGESCHLAGEN (letzter Code ${code}); Antwort-Anfang:"
              head -c 300 "$1" 2>/dev/null | tr -d '\0'; echo
              rm -f "$1"
              return 1
            }
            for y in $((Y-4)) $((Y-3)) $((Y-2)) $((Y-1)) $Y; do
              fetch_xlsx "/tmp/tennisdata/atp_${y}.xlsx" "${y}" "${y}" || true
              fetch_xlsx "/tmp/tennisdata/wta_${y}.xlsx" "${y}w" "${y}" || true
            done
            ls -la /tmp/tennisdata/ || true
          } 2>&1 | tee /tmp/clone.log

      - name: Daten holen & Vorhersagen berechnen
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}   # optional
        run: |
          set -o pipefail
          { cat /tmp/clone.log 2>/dev/null; python scripts/fetch_data.py; } 2>&1 | tee data/last_run.log

      - name: Dashboard bauen
        run: python scripts/build_site.py

      - name: Änderungen committen
        run: |
          git config user.name "sport-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/data.json data/last_run.log docs/index.html
          if git diff --cached --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "Tägliches Update $(date -u +%F)"
            git push
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Aktuellen Stand auschecken
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pages-Aktivierung mit Diagnose
        env:
          GH_T: ${{ github.token }}
        run: |
          set +e
          {
            echo "== POST /pages (build_type=workflow) =="
            curl -s -o /tmp/r1 -w "HTTP %{http_code}" -X POST \
              -H "Authorization: Bearer ${GH_T}" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pages" \
              -d '{"build_type":"workflow"}'
            echo; cat /tmp/r1; echo
            echo "== GET /pages =="
            curl -s -o /tmp/r2 -w "HTTP %{http_code}" \
              -H "Authorization: Bearer ${GH_T}" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pages"
            echo; cat /tmp/r2; echo
          } | tee data/deploy_status.txt
          git config user.name "sport-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/deploy_status.txt
          git commit -m "Deploy-Diagnose" || true
          git push || true

      - name: GitHub Pages aktivieren/konfigurieren
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Website-Ordner hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
